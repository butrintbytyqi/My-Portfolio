# Overrides the Netlify UI build settings, which still point at the
# old CRA "build" directory. Vite outputs to "dist".
[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# `netlify dev` serves the Vite app and the functions together.
[dev]
  command = "npm run dev"
  targetPort = 5173
